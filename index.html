<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出纳凭证匹配工具 - 中合五金</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{--primary:#2563eb;--primary-light:#3b82f6;--primary-bg:#eff6ff;--bg:#f1f5f9;--card:#ffffff;--border:#e2e8f0;--text:#1e293b;--text-sec:#64748b;--success:#16a34a;--success-bg:#f0fdf4;--warning:#d97706;--warning-bg:#fffbeb;--danger:#dc2626;--danger-bg:#fef2f2;--radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.header{background:linear-gradient(135deg,var(--primary),#1d4ed8);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);position:sticky;top:0;z-index:100}
.header h1{font-size:17px;font-weight:600}
.header-stats{display:flex;gap:12px;font-size:12px}
.header-stats span{background:rgba(255,255,255,.15);padding:3px 10px;border-radius:16px}
.container{max-width:1400px;margin:0 auto;padding:16px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:14px}
.card-hd{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-hd h2{font-size:14px;font-weight:600}
.card-bd{padding:16px}
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:28px;text-align:center;cursor:pointer;transition:all .2s}
.upload-zone:hover{border-color:var(--primary);background:var(--primary-bg)}
.upload-zone.active{border-color:var(--primary);background:var(--primary-bg)}
.upload-zone p{color:var(--text-sec);font-size:13px;margin-top:6px}
.upload-zone .icon{font-size:28px;color:var(--primary)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:6px;font-size:12px;font-weight:500;border:none;cursor:pointer;transition:all .2s}
.btn-p{background:var(--primary);color:#fff}.btn-p:hover{background:#1d4ed8}.btn-p:disabled{background:#93c5fd;cursor:not-allowed}
.btn-s{background:var(--success);color:#fff}.btn-s:hover{background:#15803d}
.btn-w{background:var(--warning);color:#fff}
.btn-d{background:var(--danger);color:#fff}
.btn-o{background:transparent;color:var(--primary);border:1px solid var(--primary)}.btn-o:hover{background:var(--primary-bg)}
.btn-sm{padding:3px 8px;font-size:11px}
.stats-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.stat-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)}
.stat-item .num{font-size:22px;font-weight:700;color:var(--primary)}.stat-item .label{font-size:11px;color:var(--text-sec)}
.stat-item.ok .num{color:var(--success)}.stat-item.warn .num{color:var(--warning)}.stat-item.err .num{color:var(--danger)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f8fafc;border-bottom:2px solid var(--border);padding:7px 8px;text-align:left;font-weight:600;white-space:nowrap;color:var(--text-sec);font-size:11px}
td{padding:5px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:#f8fafc}
tr.matched td{background:var(--success-bg)}
tr.unmatched td{background:var(--warning-bg)}
tr.manual td{background:#eff6ff}
.badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600}
.badge.auto{background:#dcfce7;color:#16a34a}.badge.manual{background:#dbeafe;color:#2563eb}.badge.none{background:#fef3c7;color:#d97706}
select,input[type=text]{border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:11px}
select:focus,input[type=text]:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(37,99,235,.15)}
.amount{font-family:"SF Mono",Monaco,monospace;text-align:right;font-weight:500}
.date-cell{white-space:nowrap}
.filter-bar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.fbtn{padding:3px 10px;border-radius:14px;font-size:11px;border:1px solid var(--border);background:var(--card);cursor:pointer;transition:all .2s}
.fbtn.on{background:var(--primary);color:#fff;border-color:var(--primary)}.fbtn:hover{border-color:var(--primary)}
.pagination{display:flex;gap:3px;align-items:center;justify-content:center;margin-top:10px}
.pagination button{padding:3px 8px;border:1px solid var(--border);border-radius:3px;background:var(--card);cursor:pointer;font-size:11px}
.pagination button.active{background:var(--primary);color:#fff;border-color:var(--primary)}.pagination button:disabled{opacity:.4;cursor:not-allowed}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--card);border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.2);width:90%;max-width:500px;max-height:80vh;overflow-y:auto}
.modal-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-hd h3{font-size:15px;font-weight:600}.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-sec)}
.modal-bd{padding:18px}
.fg{margin-bottom:14px}.fg label{display:block;font-size:12px;font-weight:500;margin-bottom:3px;color:var(--text-sec)}.fg input,.fg select{width:100%;max-width:100%;padding:6px 10px}
.footer{text-align:center;padding:14px;color:var(--text-sec);font-size:11px;border-top:1px solid var(--border);margin-top:20px}
.pbar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin:6px 0}.pbar .fill{height:100%;border-radius:3px;transition:width .3s;background:var(--success)}
.acct-sel{min-width:160px}.cust-sel{min-width:180px;max-width:280px}
.search-inp{width:180px;padding:5px 8px;border:1px solid var(--border);border-radius:5px;font-size:12px}.search-inp:focus{outline:none;border-color:var(--primary)}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="header">
<h1>📋 出纳凭证匹配工具</h1>
<div class="header-stats" id="hStats">
<span id="sCust">客户:--</span><span id="sSupp">供应商:--</span><span id="sAcct">科目:--</span>
</div>
</div>
<div class="container">
<!-- 初始化区 -->
<div class="card" id="initCard">
<div class="card-hd"><h2>🔧 基础数据</h2><div id="initSt"></div></div>
<div class="card-bd" id="initBd">
<div id="initUpload">
<p style="margin-bottom:10px;color:var(--text-sec);font-size:13px">上传金蝶财务初始数据文件（5个xls），客户/供应商/科目将保存到浏览器，下次无需重新上传</p>
<div class="upload-zone" id="initZone"><div class="icon">📁</div><p>点击或拖拽上传金蝶财务初始数据文件（支持多选）</p><input type="file" id="initFI" multiple accept=".xls,.xlsx" style="display:none"></div>
</div>
<div id="initDone" class="hidden">
<div style="display:flex;align-items:center;gap:10px;color:var(--success)"><span style="font-size:20px">✅</span><div><div style="font-weight:600">基础数据已加载</div><div style="font-size:12px;color:var(--text-sec)" id="initInfo"></div></div></div>
<div style="margin-top:10px"><button class="btn btn-o btn-sm" onclick="resetInit()">重新上传</button></div>
</div>
</div>
</div>
<!-- 工作区 -->
<div id="workArea" class="hidden">
<div class="card">
<div class="card-hd"><h2>📤 上传银行收入/支出明细</h2></div>
<div class="card-bd">
<div class="upload-zone" id="detZone"><div class="icon">💳</div><p>点击或拖拽上传银行明细表（3列：日期、摘要、金额）</p><input type="file" id="detFI" accept=".xls,.xlsx" style="display:none"></div>
<div id="detInfo" class="hidden" style="margin-top:10px;display:flex;align-items:center;gap:8px"><span>✅</span><span id="detFN"></span><button class="btn btn-o btn-sm" onclick="clearDet()">清除</button></div>
</div>
</div>
<div class="card" id="cfgCard" style="display:none">
<div class="card-hd"><h2>⚙️ 凭证配置</h2></div>
<div class="card-bd">
<div style="display:flex;gap:20px;flex-wrap:wrap">
<div class="fg" style="margin:0"><label>凭证类型</label><select id="vType" onchange="reMatch()"><option value="receive">收款凭证</option><option value="pay">付款凭证</option></select></div>
<div class="fg" style="margin:0"><label>银行科目</label><select id="bankAcct"><option value="100206">100206 西藏银行-刘义虎</option><option value="100201">100201 建行北京中路支行</option><option value="100202">100202 工行8810-徐凤霞</option><option value="100203">100203 建行0085-徐凤霞</option><option value="100204">100204 鑫业-建行5035</option><option value="100205">100205 鑫启航-建行</option><option value="1001">1001 现金</option><option value="100901">100901 毕总微信</option></select></div>
<div class="fg" style="margin:0"><label>默认货款科目</label><select id="defAcct"><option value="1131">1131 应收账款（挂客户）</option><option value="5101">5101 主营业务收入（挂客户）</option><option value="2103">2103 应付账款（挂供应商）</option></select></div>
</div>
</div>
</div>
<div class="stats-bar" id="statsBar" style="display:none">
<div class="stat-item"><div><div class="num" id="nTotal">0</div><div class="label">总记录</div></div></div>
<div class="stat-item ok"><div><div class="num" id="nMatched">0</div><div class="label">已匹配</div></div></div>
<div class="stat-item warn"><div><div class="num" id="nUnmatch">0</div><div class="label">待确认</div></div></div>
<div class="stat-item"><div><div class="num" id="nAmt">0</div><div class="label">总金额</div></div></div>
<div style="flex:1"></div>
<button class="btn btn-p" onclick="reMatch()">🔄 重新匹配</button>
<button class="btn btn-s" onclick="doExport()">📥 导出金蝶凭证</button>
</div>
<div id="pCard" class="card hidden"><div class="card-bd" style="padding:10px 16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px"><span style="font-size:12px;font-weight:500">匹配进度</span><span style="font-size:12px;color:var(--text-sec)" id="pTxt">0%</span></div><div class="pbar"><div class="fill" id="pFill" style="width:0%"></div></div></div></div>
<div class="filter-bar" id="fBar" style="display:none">
<span style="font-size:12px;color:var(--text-sec)">筛选：</span>
<button class="fbtn on" onclick="setF('all',this)">全部</button>
<button class="fbtn" onclick="setF('matched',this)">✅已匹配</button>
<button class="fbtn" onclick="setF('unmatched',this)">⚠️待确认</button>
<button class="fbtn" onclick="setF('nonsales',this)">📋非货款</button>
<div style="flex:1"></div>
<input type="text" class="search-inp" placeholder="搜索摘要/客户..." id="sInp" oninput="render()">
</div>
<div class="card" id="tblCard" style="display:none">
<div class="card-bd" style="padding:0">
<div class="table-wrap">
<table><thead><tr>
<th style="width:36px">#</th><th style="width:82px">日期</th><th>摘要</th><th style="width:90px">金额</th><th style="width:72px">状态</th><th style="width:170px">对方科目</th><th style="width:220px">客户/供应商</th><th style="width:80px">编码</th><th style="width:50px">操作</th>
</tr></thead><tbody id="tBody"></tbody></table>
</div>
<div class="pagination" id="pag"></div>
</div>
</div>
</div>
</div>
<div class="footer">开发者：张洪杰，侵权必究</div>

<div class="modal-bg hidden" id="addModal">
<div class="modal">
<div class="modal-hd"><h3 id="addTitle">新增客户</h3><button class="modal-close" onclick="closeAdd()">&times;</button></div>
<div class="modal-bd">
<div class="fg"><label>编码</label><input type="text" id="addCode" placeholder="如：02.01.0200 或 200"></div>
<div class="fg"><label>名称</label><input type="text" id="addName" placeholder="客户/供应商全称"></div>
<div class="fg"><label>类型</label><select id="addType"><option value="customer">客户（应收账款）</option><option value="supplier">供应商（应付账款）</option></select></div>
<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px"><button class="btn btn-o" onclick="closeAdd()">取消</button><button class="btn btn-p" onclick="confirmAdd()">确认添加</button></div>
</div>
</div>
</div>

const initZ=document.getElementById('initZone'),initFI=document.getElementById('initFI');
initZ.onclick=()=>initFI.click();

function handleInit(files){
  let done=0;custs=[];supps=[];accts=[];
  for(let f of files){
    const r=new FileReader();
    r.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const d=XLSX.utils.sheet_to_json(ws,{header:1});
        for(let row of d){
          const code=String(row[0]||'').trim(),name=String(row[1]||'').trim();
          if(code==='1131'&&name.includes('应收账款_')){const p=name.split('_',3);if(p.length>=3){custs.push({code:p[1],name:p[2],phones:xPh(p[2])})}}
          if(code==='210301'&&name.includes('货款_')){const p=name.split('_',3);if(p.length>=3){supps.push({code:p[1],name:p[2],phones:xPh(p[2])})}}
          if(code&&name&&!name.includes('_')&&!name.startsWith('   ')){accts.push({code,name,cat:''})}
        }
      }catch(err){console.error(err)}
      if(++done===files.length){custs=uniq(custs,c=>c.code);supps=uniq(supps,s=>s.code);accts=uniq(accts,a=>a.code+'|'+a.name);saveL();showDone();}
    };
    r.readAsArrayBuffer(f);
  }
}
function uniq(a,k){const s=new Set();return a.filter(x=>{const v=k(x);if(s.has(v))return false;s.add(v);return true})}

function handleDet(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const raw=XLSX.utils.sheet_to_json(ws,{header:1});
    recs=[];
    for(let i=0;i<raw.length;i++){
      const row=raw[i];if(!row[0]&&!row[1]&&!row[2])continue;
      let dv=row[0],ds='';
      if(dv instanceof Date)ds=fmtD(dv);
      else if(typeof dv==='number'){const d=new Date((dv-25569)*864e5);ds=fmtD(d)}
      else ds=String(dv||'').replace(/-/g,'').substring(0,8);
      const sm=String(row[1]||'').trim(),am=parseFloat(row[2])||0;
      if(sm&&am)recs.push({id:i,date:ds,summary:sm,amount:am,mType:'none',mTarget:'',mCode:'',mName:'',acctC:'',acctN:'',auxType:'',conf:0,isNS:false});
    }
    document.getElementById('detInfo').classList.remove('hidden');
    document.getElementById('detFN').textContent=file.name+' ('+recs.length+'条)';
    document.getElementById('cfgCard').style.display='';
    document.getElementById('statsBar').style.display='';
    document.getElementById('pCard').classList.remove('hidden');
    document.getElementById('fBar').style.display='';
    document.getElementById('tblCard').style.display='';
    reMatch();
  };
  r.readAsArrayBuffer(file);
}
function clearDet(){recs=[];document.getElementById('detInfo').classList.add('hidden');document.getElementById('cfgCard').style.display='none';document.getElementById('statsBar').style.display='none';document.getElementById('pCard').classList.add('hidden');document.getElementById('fBar').style.display='none';document.getElementById('tblCard').style.display='none';detFI.value='';}
function fmtD(d){return d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')}

// === 手机号提取 ===
function xPh(t){return(t.match(/1[3-9]\d{9}/g)||[])}
// 从摘要提取手机号（支持10位和11位）
function xPhSumm(t){
  let ph=t.match(/1[3-9]\d{9}/g)||[];
  // 也提取10位数字（可能缺1）
  let ph10=t.match(/\d{10}/g)||[];
  for(let p of ph10){
    if(p.startsWith('1')&&ph.includes(p))continue;
    // 尝试加1前缀
    if(p.length===10){const fp='1'+p;if(!ph.includes(fp))ph.push(fp)}
  }
  // 也提取11位数字（可能不是1开头但在名称中是1开头）
  let ph11=t.match(/\d{11}/g)||[];
  for(let p of ph11){if(!ph.includes(p))ph.push(p)}
  return ph;
}

// === 名称关键词提取 ===
function xKw(t){
  let c=t.replace(/1[3-9]\d{9}/g,'').replace(/[\d.]+/g,'').replace(/[（()）+\-，,、元]/g,' ');
  // 去掉业务员前缀
  for(let s of SALESMEN)c=c.replace(s,'');
  // 去掉常见地名前缀
  const pf=['拉萨市','拉萨城关区','拉萨市城关区','拉萨市堆龙德庆区','日喀则市','日喀则桑珠孜区','日喀则市桑珠孜区','山南市','那曲市','林芝市','阿里地区','阿里地区噶尔县','拉萨市达孜区','拉萨市曲水县','拉萨市当雄县','拉萨市墨竹工卡县','拉萨市林周县','拉萨市尼木县','拉萨市堆龙德庆区羊达街道','拉萨市堆龙德庆区东嘎街道','拉萨市堆龙德庆区乃琼街道','拉萨市城关区纳金街道','拉萨市城关区蔡公堂街道','拉萨市城关区娘热街道','拉萨市城关区扎细街道','拉萨市城关区金珠西路街道','拉萨市城关区嘎玛贡桑街道','拉萨市城关区塔玛街道','拉萨市城关区当热中路','拉萨市城关区川藏公路'];
  for(let p of pf)c=c.replace(p,' ');
  return c.split(/\s+/).filter(w=>w.length>=2);
}

// === 匹配逻辑 ===
function matchOne(summary, list){
  const phones=xPhSumm(summary);
  const kwds=xKw(summary);
  let best=null,bestS=0;
  
  for(let item of list){
    let s=0;
    // 手机号匹配（最高优先级）
    if(phones.length&&item.phones.length){
      for(let p of phones){
        if(item.phones.includes(p)){s=100;break}
        // 也做后8位匹配
        if(p.length>=8&&item.phones.some(ip=>ip.endsWith(p.slice(-8)))){s=95;break}
      }
    }
    if(s===0){
      const ic=item.name.replace(/[（）()\s]/g,'');
      const sc=summary.replace(/[（）()\s]/g,'');
      // 完全包含
      if(ic.includes(sc)||sc.includes(ic)){
        s=Math.min(ic.length,sc.length)/Math.max(ic.length,sc.length)*90;
      }
    }
    if(s===0&&kwds.length){
      // 关键词匹配
      const ikwds=xKw(item.name);
      let m=0;
      for(let k of kwds){
        if(k.length>=2&&ikwds.some(ik=>ik.includes(k)||k.includes(ik)))m++;
      }
      if(m>0)s=(m/kwds.length)*75;
      // 逐字匹配
      if(s===0){
        const ic2=item.name.replace(/[\d\s（）()]/g,'');
        const sc2=summary.replace(/[\d\s（）()]/g,'');
        let cm=0;
        for(let ch of sc2){if(ic2.includes(ch))cm++}
        if(cm>0)s=(cm/sc2.length)*50;
      }
    }
    if(s>bestS){bestS=s;best=item}
  }
  return best?{code:best.code,name:best.name,conf:Math.round(bestS)}:null;
}

function reMatch(){
  const da=document.getElementById('defAcct').value;
  const daN=da==='1131'?'应收账款':da==='5101'?'主营业务收入':'应付账款';
  const daAux=da==='1131'||da==='5101'?'customer':'supplier';
  
  for(let r of recs){
    if(r.mType==='manual')continue;
    const sm=r.summary;
    
    // 1. 非货款类
    let nsM=null;
    for(let ns of NS_MAP){
      if(ns.kw.some(k=>sm.includes(k))){nsM=ns;break}
    }
    if(nsM){
      r.isNS=true;r.acctC=nsM.acct;r.acctN=nsM.acctN;r.auxType=nsM.aux;
      if(nsM.aux==='supplier'){
        const m=matchOne(sm,supps);
        if(m){r.mType='auto';r.mTarget='supplier';r.mCode=m.code;r.mName=m.name;r.conf=m.conf}
        else{r.mType='none';r.mTarget='supplier';r.mCode='';r.mName='';r.conf=0}
      }else{r.mType='auto';r.mTarget='';r.mCode='';r.mName='';r.conf=100}
      continue;
    }
    
    // 2. 零散/未知
    if(sm==='零散客户'||sm==='未知'){
      r.isNS=false;r.mType='auto';r.mTarget='customer';r.mCode='0001';r.mName='零散客户';
      r.acctC=da;r.acctN=daN;r.auxType=daAux;r.conf=100;
      continue;
    }
    
    // 3. 去掉业务员前缀后再匹配
    let cleanSm=sm;
    for(let sl of SALESMEN){
      if(sm.startsWith(sl)){cleanSm=sm.substring(sl.length);break}
    }
    
    // 4. 匹配客户
    const cm=matchOne(sm,custs);
    const cm2=cleanSm!==sm?matchOne(cleanSm,custs):null;
    let bestCm=cm;
    if(cm2&&cm2.conf>(cm?cm.conf:0))bestCm=cm2;
    
    if(bestCm&&bestCm.conf>=50){
      r.isNS=false;r.mType='auto';r.mTarget='customer';r.mCode=bestCm.code;r.mName=bestCm.name;
      r.acctC=da;r.acctN=daN;r.auxType='customer';r.conf=bestCm.conf;
      continue;
    }
    
    // 5. 未匹配
    r.isNS=false;r.mType='none';r.mTarget='customer';r.mCode='';r.mName='';
    r.acctC=da;r.acctN=daN;r.auxType='customer';r.conf=bestCm?bestCm.conf:0;
  }
  updStats();render();
}

// === 统计 ===
function updStats(){
  const t=recs.length,m=recs.filter(r=>r.mType!=='none').length,u=t-m;
  const a=recs.reduce((s,r)=>s+r.amount,0);
  document.getElementById('nTotal').textContent=t;
  document.getElementById('nMatched').textContent=m;
  document.getElementById('nUnmatch').textContent=u;
  document.getElementById('nAmt').textContent=a.toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2});
  const p=t>0?Math.round(m/t*100):0;
  document.getElementById('pTxt').textContent=p+'%';
  document.getElementById('pFill').style.width=p+'%';
}

// === 筛选 ===
function setF(f,btn){curF=f;curP=1;document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');render()}
function getFiltered(){
  const q=document.getElementById('sInp').value.trim().toLowerCase();
  return recs.filter(r=>{
    if(curF==='matched'&&r.mType==='none')return false;
    if(curF==='unmatched'&&r.mType!=='none')return false;
    if(curF==='nonsales'&&!r.isNS)return false;
    if(q){const t=(r.summary+' '+r.mName+' '+r.acctN).toLowerCase();if(!t.includes(q))return false}
    return true;
  });
}

// === 渲染表格 ===
function render(){
  const fl=getFiltered(),tp=Math.ceil(fl.length/PS);
  if(curP>tp)curP=Math.max(1,tp);
  const st=(curP-1)*PS,pd=fl.slice(st,st+PS);
  let h='';
  for(let r of pd){
    const rc=r.mType==='auto'?'matched':r.mType==='manual'?'manual':'unmatched';
    const bc=r.mType==='auto'?'auto':r.mType==='manual'?'manual':'none';
    const bt=r.mType==='auto'?'自动✓':r.mType==='manual'?'手动✓':'待确认';
    const dd=r.date?r.date.substring(0,4)+'.'+r.date.substring(4,6)+'.'+r.date.substring(6,8):'';
    const selList=r.mTarget==='supplier'?supps:custs;
    
    h+='<tr class="'+rc+'"><td style="color:var(--text-sec);font-size:10px">'+(r.id+1)+'</td><td class="date-cell">'+dd+'</td>';
    h+='<td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+esc(r.summary)+'">'+esc(r.summary)+'</td>';
    h+='<td class="amount">'+r.amount.toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2})+'</td>';
    h+='<td><span class="badge '+bc+'">'+bt+'</span>'+((r.conf>0&&r.conf<100)?'<br><span style="font-size:9px;color:var(--text-sec)">'+r.conf+'%</span>':'')+'</td>';
    h+='<td><select class="acct-sel" onchange="chgAcct('+r.id+',this.value)">'+ACCTS.map(a=>'<option value="'+a.c+'"'+(a.c===r.acctC?' selected':'')+'>'+a.c+' '+a.n+'</option>').join('')+'</select></td>';
    h+='<td><select class="cust-sel" onchange="chgMatch('+r.id+',this.value)"><option value="">-- 选择 --</option>';
    for(let it of selList){h+='<option value="'+it.code+'"'+(it.code===r.mCode?' selected':'')+'>'+it.code+' '+it.name.substring(0,22)+'</option>'}
    h+='</select></td>';
    h+='<td style="font-family:monospace;font-size:10px">'+(r.mCode||'-')+'</td>';
    h+='<td><button class="btn btn-o btn-sm" onclick="openAdd('+r.id+')" title="新增">➕</button></td></tr>';
  }
  document.getElementById('tBody').innerHTML=h;
  // 分页
  let ph='<button '+(curP<=1?'disabled':'')+' onclick="curP--;render()">◀</button>';
  const sp=Math.max(1,curP-3),ep=Math.min(tp,curP+3);
  for(let p=sp;p<=ep;p++)ph+='<button class="'+(p===curP?'active':'')+'" onclick="curP='+p+';render()">'+p+'</button>';
  ph+='<button '+(curP>=tp?'disabled':'')+' onclick="curP++;render()">▶</button>';
  ph+='<span style="font-size:11px;color:var(--text-sec);margin-left:6px">'+(st+1)+'-'+Math.min(st+PS,fl.length)+'/'+fl.length+'</span>';
  document.getElementById('pag').innerHTML=ph;
}
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}

// === 手动操作 ===
function chgAcct(id,v){
  const r=recs.find(x=>x.id===id);if(!r)return;
  const a=ACCTS.find(x=>x.c===v);
  if(a){r.acctC=a.c;r.acctN=a.n;r.auxType=a.aux;if(a.aux==='supplier')r.mTarget='supplier';else if(a.aux==='customer')r.mTarget='customer';r.mType=r.mCode?'manual':'none';updStats();render()}
}
function chgMatch(id,v){
  const r=recs.find(x=>x.id===id);if(!r)return;
  if(!v){r.mCode='';r.mName='';r.mType='none';r.conf=0}
  else{let f=null;if(r.mTarget==='supplier')f=supps.find(x=>x.code===v);else f=custs.find(x=>x.code===v);
  if(f){r.mCode=f.code;r.mName=f.name;r.mType='manual';r.conf=100}}
  updStats();render();
}

function openAdd(id){editIdx=id;const r=recs.find(x=>x.id===id);document.getElementById('addType').value=r.mTarget==='supplier'?'supplier':'customer';document.getElementById('addName').value=r.summary.replace(/[（(].+?[)）]/g,'').trim();document.getElementById('addCode').value='';document.getElementById('addModal').classList.remove('hidden')}

function confirmAdd(){
  const c=document.getElementById('addCode').value.trim(),n=document.getElementById('addName').value.trim(),t=document.getElementById('addType').value;
  if(!c||!n){alert('编码和名称不能为空');return}
  const ph=xPh(n);
  if(t==='customer'){if(custs.find(x=>x.code===c)){alert('编码已存在');return}custs.push({code:c,name:n,phones:ph})}
  else{if(supps.find(x=>x.code===c)){alert('编码已存在');return}supps.push({code:c,name:n,phones:ph})}
  saveL();
  const r=recs.find(x=>x.id===editIdx);
  if(r){r.mCode=c;r.mName=n;r.mTarget=t==='customer'?'customer':'supplier';r.mType='manual';r.conf=100;updStats();render()}
  closeAdd();
  document.getElementById('sCust').textContent='客户:'+custs.length;
  document.getElementById('sSupp').textContent='供应商:'+supps.length;
}

    cr[0]=dt;cr[1]=vw;cr[2]=vn;cr[5]=smrS;cr[6]=r.acctC;cr[7]=r.acctN;cr[11]='CNY';cr[13]=1;
    cr[isR?16:15]=r.amount;
    if(r.auxType==='customer'&&r.mCode){cr[17]=r.mCode;cr[18]=r.mName}
    else if(r.auxType==='supplier'&&r.mCode){cr[19]=r.mCode;cr[20]=r.mName}
    rows.push(cr);
    vn++;
  }
  
  const wsD=[h1,h2,h3,...rows];
  const ws=XLSX.utils.aoa_to_sheet(wsD);
  ws['!cols']=[{wch:12},{wch:8},{wch:8},{wch:8},{wch:8},{wch:40},{wch:12},{wch:20},{wch:8},{wch:8},{wch:8},{wch:8},{wch:8},{wch:8},{wch:12},{wch:14},{wch:14},{wch:14},{wch:20},{wch:14},{wch:20},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'sheet1（名称勿改）');
  XLSX.writeFile(wb,'凭证导入_'+(isR?'收款':'付款')+'_'+new Date().toISOString().slice(0,10)+'.xlsx');
}

init();
</script>
